name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 requests beautifulsoup4 pyinstaller

    - name: Build with PyInstaller
      run: |
        cd app
        pyinstaller CaBr3-Generator.spec --clean --noconfirm

    - name: Package Artifact (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Compress-Archive -Path app/dist/CaBr3.exe -DestinationPath CaBr3-Windows.zip

    - name: Package Artifact (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        cd app/dist
        zip -r ../../CaBr3-macOS.zip CaBr3.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CaBr3-${{ matrix.os }}
        path: |
          CaBr3-Windows.zip
          CaBr3-macOS.zip
        if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/CaBr3-windows-latest/CaBr3-Windows.zip
          artifacts/CaBr3-macos-latest/CaBr3-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
